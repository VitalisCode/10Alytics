name: App CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'k8s/**'

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: devops-app
  EKS_CLUSTER: devops-eks

jobs:
  # 1. Run Tests (Python)
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd app
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests (pytest)
        run: |
          cd app
          pip install pytest
          pytest

  # 2. Build & Push Docker Image
build:
  runs-on: ubuntu-latest
  needs: test

  outputs:
    image_tag: ${{ github.sha }}

  steps:
    - uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build Docker Image
      env:
        IMAGE: ${{ secrets.ECR_REPO }}:${{ github.sha }}
      run: |
        docker build -t $IMAGE ./app

    - name: Run Container & Test
      env:
        IMAGE: ${{ secrets.ECR_REPO }}:${{ github.sha }}
      run: |
        docker run -d -p 5000:5000 --name test-container $IMAGE

        # Wait for app to start
        sleep 10

        # Test endpoint
        curl --fail http://localhost:5000 || exit 1

        # Cleanup
        docker stop test-container
        docker rm test-container

    - name: Push Docker Image
      env:
        IMAGE: ${{ secrets.ECR_REPO }}:${{ github.sha }}
      run: |
        docker push $IMAGE

  # Manual Approval
  approve:
    needs: build
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Awaiting Approval
        run: echo "Approval granted, proceeding to deploy..."

  # Deploy via kubectl ───
  deploy:
    needs: [build, approve]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.EKS_CLUSTER }} \
            --region ${{ env.AWS_REGION }}

      - name: Verify cluster connectivity  # ← Add this debug step
        run: kubectl cluster-info

      - name: Create DB Secret in Kubernetes
        run: |
          kubectl create secret generic db-credentials \
            --from-literal=DB_HOST=${{ secrets.DB_HOST }} \
            --from-literal=DB_NAME=${{ secrets.DB_NAME }} \
            --from-literal=DB_USER=${{ secrets.DB_USERNAME }} \
            --from-literal=DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy App
        run: |
          kubectl apply -f k8s/deployment.yaml

      - name: Update Image
        run: |
          kubectl set image deployment/devops-app \
            devops-app=${{ secrets.ECR_REPO }}:${{ github.sha }}
          kubectl rollout status deployment/devops-app --timeout=120s

      - name: Verify Deployment
        run: |
          kubectl get pods -l app=devops-app